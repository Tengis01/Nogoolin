          $ref: '#/components/responses/NotFound'

  # ════════════════════════════════════════════════
  # ADMIN: SETTINGS (DELIVERY TOGGLE)
  # ════════════════════════════════════════════════
  /admin/settings:
    get:
      tags: [Admin - Settings]
      summary: Get all system settings
      description: |
        Returns all key-value settings, including `delivery_enabled`,
        for the admin settings page.

        Ref: FR-ADM-007, FR-SET-001
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All system settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
                    example:
                      delivery_enabled: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/settings/delivery:
    patch:
      tags: [Admin - Settings]
      summary: Toggle delivery enabled/disabled
      description: |
        Updates the `delivery_enabled` setting. Only an admin may
        call this endpoint (FR-SET-003).

        **Effects when enabling (`true`):**
        - Frontend shows cart/checkout/order UI (FR-SET-005)
        - `POST /orders` is no longer rejected (FR-SET-004, UC-SYS-002)

        **Effects when disabling (`false`):**
        - Frontend hides cart/checkout/order UI
        - `POST /orders` is rejected with HTTP 403 (FR-SET-004)
        - Existing orders are unaffected (UC-ADM-011)

        The change is reflected in `GET /settings/public` within
        60 seconds (FR-SET-006).

        Always writes an audit log entry:
        `action: DELIVERY_TOGGLE`, `metadata: { from, to }`
        (FR-SET-007, FR-AUD-005).

        A failed (non-admin) attempt also writes a
        `UNAUTHORIZED_ACCESS` audit log entry (UC-ADM-011 Exception Flow).

        Ref: UC-ADM-011, UC-SYS-002, UC-SYS-003,
        FR-SET-001 to FR-SET-007, FR-AUD-005, SEQ-004
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delivery_enabled]
              properties:
                delivery_enabled:
                  type: boolean
            example:
              delivery_enabled: true
      responses:
        '200':
          description: Setting updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PublicSettings'
              example:
                data:
                  delivery_enabled: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Non-admin user attempted this endpoint. A failed-access
            audit log entry is written (UC-ADM-011 Exception Flow).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════
  # ADMIN: AUDIT LOG
  # ════════════════════════════════════════════════
  /admin/audit-logs:
    get:
      tags: [Admin - Audit]
      summary: View audit log
      description: |
        Returns audit log entries, sorted by newest first.
        Entries are append-only — no PATCH/DELETE endpoints exist
        for this resource by design (FR-AUD-003).

        Ref: UC-ADM-012, FR-AUD-001, FR-AUD-002, FR-AUD-004
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: entity_type
          in: query
          description: Filter by entity type, e.g. `product`, `system_settings`
          schema:
            type: string
        - name: action
          in: query
          description: Filter by action, e.g. `DELIVERY_TOGGLE`, `PRODUCT_PUBLISH`
          schema:
            type: string
      responses:
        '200':
          description: Paginated audit log, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                data:
                  - id: "8f14e45f-ceea-4c4a-b0b1-000000000301"
                    admin_id: "8f14e45f-ceea-4c4a-b0b1-00000000ad01"
                    action: "DELIVERY_TOGGLE"
                    entity_type: "system_settings"
                    entity_id: null
                    metadata:
                      from: false
                      to: true
                    created_at: "2026-06-13T10:10:00Z"
                meta:
                  page: 1
                  limit: 12
                  total: 1
                  total_pages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ════════════════════════════════════════════════
  # ORDERS (Future — W priority)
  # Gated by system_settings.delivery_enabled
  # NOT ACTIVATED IN MVP — defined for architectural
  # completeness per NFR-SCA-003
  # ════════════════════════════════════════════════
  /orders:
    post:
      tags: [Orders (Future)]
      summary: "(Future) Place an order"
      description: |
        NOT ACTIVE IN MVP. Defined for architectural completeness.

        Requires authentication (`customer` role). Before creating the
        order, the system checks `system_settings.delivery_enabled`:

        - If `false` → returns `403 Forbidden` with
          `{ error: "Order placement is currently disabled" }`
          (FR-SET-004, FR-ORD-008, UC-SYS-002, enforced regardless
          of frontend state)
        - If `true` → creates an `orders` record (`status: pending`)
          and corresponding `order_items` records

        Ref: UC-F-001, FR-ORD-001 to FR-ORD-004, FR-ORD-008,
        FR-SET-004, SEQ-006
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, address, phone]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, quantity]
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 1
                address:
                  type: string
                phone:
                  type: string
            example:
              items:
                - product_id: "8f14e45f-ceea-4c4a-b0b1-000000000010"
                  quantity: 1
              address: "Улаанбаатар, Сүхбаатар дүүрэг, ..."
              phone: "99112233"
      responses:
        '201':
          description: Order created with status `pending`
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      customer_id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, confirmed, delivering, completed, cancelled]
                      total_amount:
                        type: number
                      created_at:
                        type: string
                        format: date-time
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            `delivery_enabled = false` — order placement disabled at
            the API level regardless of how the request was made.

            Ref: FR-SET-004, FR-ORD-008, UC-SYS-002
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Order placement is currently disabled"
                code: "DELIVERY_DISABLED"

  /orders/me:
    get:
      tags: [Orders (Future)]
      summary: "(Future) View own order history"
      description: |
        NOT ACTIVE IN MVP. Defined for architectural completeness.

        Returns the authenticated customer's own orders, newest first.
        A customer can only access their own orders — enforced via
        ownership check at the service layer (IDOR prevention,
        NFR-SEC-010).

        Ref: UC-F-002, FR-ORD-007
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of the authenticated customer's orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        status:
                          type: string
                          enum: [pending, confirmed, delivering, completed, cancelled]
                        total_amount:
                          type: number
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            `delivery_enabled = false` — order features fully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

