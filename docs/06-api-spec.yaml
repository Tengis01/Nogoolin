# Changelog
# | Version | Date       | Type  | Description       |
# |---------|------------|-------|--------------------|
# | 1.0.0   | June 2026  | MAJOR | Initial version. Covers public catalog
# |         |            |       | (categories, products, multi-script
# |         |            |       | search FR-PUB-014), inquiries, admin
# |         |            |       | products/categories/media/inquiries/
# |         |            |       | settings/audit, and future order
