                  page: 1
                  limit: 12
                  total: 1
                  total_pages: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/inquiries/{id}/status:
    patch:
      tags: [Admin - Inquiries]
      summary: Update inquiry status
      description: |
        Updates inquiry status through the lifecycle:
        `new` → `contacted` → `closed`.

        Writes an audit log entry on success.

        Ref: UC-ADM-010, FR-INQ-005
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
