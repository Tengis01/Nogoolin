        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          description: Filter by inquiry status (FR-INQ-006)
          schema:
            $ref: '#/components/schemas/InquiryStatus'
      responses:
        '200':
          description: Paginated inquiry list, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Inquiry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                data:
                  - id: "8f14e45f-ceea-4c4a-b0b1-000000000201"
                    product_id: "8f14e45f-ceea-4c4a-b0b1-000000000010"
                    product:
                      id: "8f14e45f-ceea-4c4a-b0b1-000000000010"
                      name: "Ногоон Дарь Эх"
                      slug: "nogoon-dar-eh"
                    customer_name: "Бат-Эрдэнэ"
                    phone: "99112233"
                    message: "Энэ бүтээгдэхүүн одоо байгаа эсэх?"
                    status: new
                    created_at: "2026-06-13T10:00:00Z"
